version: '3.8'

services:
  trading-engine:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "50051:50051"  # gRPC API
      - "9999:9999/udp"  # Market data feed
      - "8080:8080"    # Metrics/monitoring
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - TRADING_ENGINE_LOG_LEVEL=INFO
      - TRADING_ENGINE_THREADS=8
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - trading-network
    
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - trading-network
      
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - trading-network
      
  market-data-simulator:
    build:
      context: .
      dockerfile: docker/Dockerfile.simulator
    environment:
      - SIMULATOR_SYMBOLS=AAPL,GOOGL,MSFT,TSLA
      - SIMULATOR_RATE=1000  # messages per second
      - TARGET_HOST=trading-engine
      - TARGET_PORT=9999
    depends_on:
      - trading-engine
    networks:
      - trading-network

networks:
  trading-network:
    driver: bridge