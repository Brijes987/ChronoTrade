global:
  scrape_interval: 1s
  evaluation_interval: 1s

rule_files:
  - "trading_engine_rules.yml"

scrape_configs:
  - job_name: 'trading-engine'
    static_configs:
      - targets: ['trading-engine:8080']
    scrape_interval: 100ms
    metrics_path: /metrics
    
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093