syntax = "proto3";

package trading_api;

service TradingService {
    rpc SubmitOrder(OrderRequest) returns (OrderResponse);
    rpc CancelOrder(CancelRequest) returns (CancelResponse);
    rpc GetMarketData(MarketDataRequest) returns (MarketDataResponse);
    rpc StreamMarketData(MarketDataRequest) returns (stream MarketDataResponse);
}

enum Side {
    BUY = 0;
    SELL = 1;
}

enum OrderType {
    MARKET = 0;
    LIMIT = 1;
    STOP = 2;
    STOP_LIMIT = 3;
}

enum OrderStatus {
    PENDING = 0;
    ACCEPTED = 1;
    PARTIALLY_FILLED = 2;
    FILLED = 3;
    CANCELLED = 4;
    REJECTED = 5;
}

message OrderRequest {
    string symbol = 1;
    Side side = 2;
    OrderType type = 3;
    int64 price = 4;        // Fixed-point price
    uint64 quantity = 5;
    string client_id = 6;
}

message OrderResponse {
    uint64 order_id = 1;
    OrderStatus status = 2;
    string message = 3;
    int64 timestamp = 4;
}

message CancelRequest {
    uint64 order_id = 1;
    string client_id = 2;
}

message CancelResponse {
    bool success = 1;
    string message = 2;
    int64 timestamp = 3;
}

message MarketDataRequest {
    string symbol = 1;
}

message MarketDataResponse {
    string symbol = 1;
    int64 bid_price = 2;
    int64 ask_price = 3;
    uint64 bid_size = 4;
    uint64 ask_size = 5;
    int64 timestamp = 6;
}